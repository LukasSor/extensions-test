<div class="search-container">
  <form action="/search" method="get" id="search-form-home" class="search-form">
    <div class="search-bar" id="search-bar-home">
      <svg
        class="search-icon"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="11" cy="11" r="8" />
        <path d="M21 21l-4.35-4.35" />
      </svg>
      <input
        type="text"
        class="search-input"
        id="search-input"
        name="q"
        autocomplete="off"
        autofocus
        placeholder="Find what you need peacefully..."
      />
      <div class="ac-dropdown" id="ac-dropdown-home"></div>
    </div>
    <div id="search-bar-actions-home" class="search-bar-actions"></div>
    <div class="button-row">
      <button type="submit" class="search-btn" id="btn-search">Search</button>
      <button type="button" class="search-btn lucky-btn">
        <span class="lucky-default">I'm Feeling Lucky</span>
        <div class="lucky-slot">
          <div class="lucky-slot-inner" id="lucky-slot-inner">
            <span>I'm Feeling Lucky</span>
          </div>
        </div>
      </button>
    </div>
  </form>
</div>
