<div class="command-result imdb-result coinflip-root" data-coinflip-root>
  <div class="plugin-panel coinflip-panel">
    <header class="coinflip-hero">
      <p class="imdb-meta">Mini-game</p>
      <h2 class="imdb-title coinflip-heading">Coin flip</h2>
      <p class="imdb-hero-meta">Fair 50/50 · heads or tails</p>
    </header>

    <div class="coinflip-scene" aria-hidden="true">
      <div class="coinflip-shadow"></div>
      <div class="coinflip-coin-wrap">
        <div class="coinflip-coin" data-coinflip-coin>
          <div class="coinflip-face coinflip-face--heads">
            <svg
              class="coinflip-coin-art"
              viewBox="0 0 100 100"
              xmlns="http://www.w3.org/2000/svg"
              focusable="false"
              aria-hidden="true"
            >
              <!-- Gold-style disc (illustration only) -->
              <circle cx="50" cy="50" r="47" fill="#c9a14a" stroke="#6e5420" stroke-width="1.25" />
              <circle cx="50" cy="50" r="42" fill="none" stroke="#f2e0b8" stroke-width="0.9" opacity="0.85" />
              <ellipse cx="34" cy="32" rx="20" ry="24" fill="#e6c56e" opacity="0.5" />
              <!-- Frontal “token” face: simple shapes (no lumpy profile silhouette) -->
              <circle cx="50" cy="44" r="17" fill="#4a3d32" stroke="#2a2218" stroke-width="0.75" />
              <ellipse cx="42" cy="38" rx="7" ry="5" fill="#5c4d42" opacity="0.45" />
              <circle cx="44" cy="43" r="2.4" fill="#f2e8dc" />
              <circle cx="56" cy="43" r="2.4" fill="#f2e8dc" />
              <path
                d="M 42 52 Q 50 59 58 52"
                fill="none"
                stroke="#f2e8dc"
                stroke-width="2"
                stroke-linecap="round"
              />
              <text
                x="50"
                y="90"
                text-anchor="middle"
                font-size="6.5"
                font-weight="700"
                letter-spacing="0.18em"
                fill="#3d2f18"
                font-family="system-ui, Segoe UI, sans-serif"
              >
                HEADS
              </text>
            </svg>
          </div>
          <div class="coinflip-face coinflip-face--tails">
            <svg
              class="coinflip-coin-art"
              viewBox="0 0 100 100"
              xmlns="http://www.w3.org/2000/svg"
              focusable="false"
              aria-hidden="true"
            >
              <!-- Silver-style disc -->
              <circle cx="50" cy="50" r="47" fill="#b8bec8" stroke="#5c6570" stroke-width="1.25" />
              <circle cx="50" cy="50" r="42" fill="none" stroke="#eef1f5" stroke-width="0.9" opacity="0.75" />
              <ellipse cx="34" cy="32" rx="18" ry="22" fill="#d8dde4" opacity="0.65" />
              <!-- Mint marks -->
              <circle cx="22" cy="38" r="2.2" fill="#7a8490" />
              <circle cx="78" cy="38" r="2.2" fill="#7a8490" />
              <!-- Large denomination-style numeral -->
              <text
                x="50"
                y="64"
                text-anchor="middle"
                font-size="44"
                font-weight="800"
                fill="#3d4856"
                font-family="system-ui, Segoe UI, sans-serif"
              >
                1
              </text>
              <text
                x="50"
                y="90"
                text-anchor="middle"
                font-size="6.5"
                font-weight="700"
                letter-spacing="0.18em"
                fill="#4a5560"
                font-family="system-ui, Segoe UI, sans-serif"
              >
                TAILS
              </text>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <p class="coinflip-result" data-coinflip-result aria-live="polite">
      <span class="imdb-grid-label coinflip-result-label">Result</span>
      <span class="coinflip-result-value" data-coinflip-result-value>—</span>
    </p>

    <button type="button" class="coinflip-again" data-coinflip-again>
      <span class="coinflip-again-icon" aria-hidden="true">↻</span>
      Spin again
    </button>
  </div>
</div>
